hooks = "core.v1beta1.hooks"
base-url = "${BASE_URL}"
rate-limit = "400/m"
seed = 42
suppress-health-check = ["filter_too_much"]
continue-on-failure = true
tls-verify = false
request-timeout = 10.0
headers = { Authorization = "Bearer ${SCHEMATHESIS_TOKEN}", "Flightctl-API-Version" = "v1beta1" }

[generation]
mode = "positive"
max-examples = 50
deterministic = true
allow-extra-parameters = false
allow-x00 = false
codec = "ascii"

[phases.examples]
enabled = true
fill-missing = true

[phases.coverage]
enabled = false

[phases.fuzzing]
enabled = true

[phases.stateful]
enabled = true
max-steps = 5

[phases.stateful.inference]
algorithms = ["location-headers", "dependency-analysis"]

[checks.not_a_server_error]
enabled = true

[checks.use_after_free]
enabled = false

[checks.positive_data_acceptance]
enabled = false

[checks.ensure_resource_availability]
enabled = true

[[operations]]
include-method = "PATCH"
enabled = false

[[operations]]
include-path = "/enrollmentrequests/{name}/approval"
[operations.checks.response_schema_conformance]
enabled = false

[[operations]]
include-path = "/auth/{providername}/token"
enabled = false

[[operations]]
include-path = "/fleets/{name}"
parameters = { "path.name" = "default" }

[[operations]]
include-path = "/fleets/{fleet}/templateversions"
parameters = { "path.fleet" = "default" }

# knownRenderedVersion triggers a server-side long-poll; allow enough time for it to complete
[[operations]]
include-path = "/devices/{name}/rendered"
request-timeout = 60.0

[reports.vcr]
enabled = true

[reports.har]
enabled = true

[reports.ndjson]
enabled = true

[output.sanitization]
enabled = false
