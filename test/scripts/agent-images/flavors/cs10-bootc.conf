# Flavor configuration for cs10-bootc
# Uses community-el10 packaging flavor by default, override with DISTRO=redhat for redhat-el10

# Determine flavor based on DISTRO (preferred) or RHEM (fallback) environment variables
if [ "${DISTRO:-}" = "redhat" ]; then
    FLAVOR_DIR="redhat-el10"
elif [ -n "${RHEM:-}" ]; then
    FLAVOR_DIR="redhat-el10"
else
    FLAVOR_DIR="community-el10"
fi

# Source packaging flavor configuration
SCRIPT_DIR="$(dirname "$(readlink -f "${BASH_SOURCE[0]}")")"
ROOT_DIR="$(cd "${SCRIPT_DIR}/../../../.." && pwd)"
PACKAGING_FLAVOR="${ROOT_DIR}/packaging/flavors/${FLAVOR_DIR}/Containerfile.buildargs"

if [ -f "${PACKAGING_FLAVOR}" ]; then
    echo "Loading packaging flavor: ${FLAVOR_DIR}" >&2
    # Load build args from packaging flavor config
    while IFS='=' read -r key value; do
        if [[ -n "${key}" && ! "${key}" =~ ^[[:space:]]*# ]]; then
            # Remove quotes from value and export
            value=$(echo "${value}" | sed 's/^"//;s/"$//')
            export "${key}=${value}"
        fi
    done < <(grep -v '^[[:space:]]*#' "${PACKAGING_FLAVOR}" | grep -v '^[[:space:]]*$')
fi

# Agent-specific settings (from original cs10-bootc config)
OS_ID=cs10-bootc
ENABLE_CRB=${ENABLE_CRB:-1}
EPEL_NEXT=${EPEL_NEXT:-0}


