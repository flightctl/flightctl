            - "!$test"
            - "!**/internal/service/device/**"
            - "!**/internal/store/**"
            - "!**/cmd/**"
            - "!**/internal/migration/**"
            - "!**/internal/instrumentation/metrics/**"
            - "!**/internal/api_server/server.go"
            - "!**/internal/api_server/agentserver/server.go"
            - "!**/internal/remote_access_server/server.go"
            - "!**/internal/periodic_checker/server.go"
            - "!**/internal/worker_server/server.go"
            - "!**/test/**"
          deny:
            - pkg: "github.com/flightctl/flightctl/internal/store/device$"
              desc: "Use internal/service/device instead of importing the store (EDM-4844)"
            - pkg: "github.com/flightctl/flightctl/internal/store/device/"
              desc: "Use internal/service/device instead of importing the store (EDM-4844)"

        store-enrollmentrequest-owners-only:
          list-mode: lax
          files:
            - "$all"
            - "!$test"
            - "!**/internal/service/enrollmentrequest/**"
            - "!**/internal/store/**"
            - "!**/cmd/**"
            - "!**/internal/migration/**"
            - "!**/internal/instrumentation/metrics/**"
            - "!**/internal/api_server/server.go"
            - "!**/internal/api_server/agentserver/server.go"
            - "!**/internal/imagebuilder_worker/worker.go"
            - "!**/test/**"
          deny:
            - pkg: "github.com/flightctl/flightctl/internal/store/enrollmentrequest$"
              desc: "Use internal/service/enrollmentrequest instead of importing the store (EDM-4844)"
            - pkg: "github.com/flightctl/flightctl/internal/store/enrollmentrequest/"
              desc: "Use internal/service/enrollmentrequest instead of importing the store (EDM-4844)"

        store-event-owners-only:
          list-mode: lax
          files:
            - "$all"
            - "!$test"
            - "!**/internal/service/event/**"
            # events emits/persists via the event store (internal emitter used by other services).
            - "!**/internal/service/events/**"
            - "!**/internal/store/**"
            - "!**/cmd/**"
            - "!**/internal/migration/**"
            - "!**/internal/instrumentation/metrics/**"
            - "!**/internal/api_server/server.go"
            - "!**/internal/api_server/agentserver/server.go"
            - "!**/internal/imagebuilder_api/server.go"
            - "!**/internal/remote_access_server/server.go"
            - "!**/internal/periodic_checker/server.go"
            - "!**/internal/worker_server/server.go"
            - "!**/internal/imagebuilder_worker/worker.go"
            - "!**/test/**"
          deny:
            - pkg: "github.com/flightctl/flightctl/internal/store/event$"
              desc: "Use internal/service/event instead of importing the store (EDM-4844)"
            - pkg: "github.com/flightctl/flightctl/internal/store/event/"
              desc: "Use internal/service/event instead of importing the store (EDM-4844)"

        store-fleet-owners-only:
          list-mode: lax
          files:
            - "$all"
            - "!$test"
            - "!**/internal/service/fleet/**"
            - "!**/internal/store/**"
            - "!**/cmd/**"
            - "!**/internal/migration/**"
            - "!**/internal/instrumentation/metrics/**"
            - "!**/internal/api_server/server.go"
            - "!**/internal/api_server/agentserver/server.go"
            - "!**/internal/remote_access_server/server.go"
            - "!**/internal/periodic_checker/server.go"
            - "!**/internal/worker_server/server.go"
            - "!**/test/**"
          deny:
            - pkg: "github.com/flightctl/flightctl/internal/store/fleet$"
              desc: "Use internal/service/fleet instead of importing the store (EDM-4844)"
            - pkg: "github.com/flightctl/flightctl/internal/store/fleet/"
              desc: "Use internal/service/fleet instead of importing the store (EDM-4844)"

        store-organization-owners-only:
          list-mode: lax
          files:
            - "$all"
            - "!$test"
            - "!**/internal/service/organization/**"
            - "!**/internal/store/**"
            - "!**/cmd/**"
            - "!**/internal/migration/**"
            - "!**/internal/instrumentation/metrics/**"
            - "!**/internal/api_server/server.go"
            - "!**/internal/api_server/agentserver/server.go"
            - "!**/internal/imagebuilder_api/server.go"
            - "!**/internal/remote_access_server/server.go"
            - "!**/internal/periodic_checker/server.go"
            - "!**/internal/imagebuilder_worker/worker.go"
            - "!**/test/**"
          deny:
            - pkg: "github.com/flightctl/flightctl/internal/store/organization$"
              desc: "Use internal/service/organization instead of importing the store (EDM-4844)"
            - pkg: "github.com/flightctl/flightctl/internal/store/organization/"
              desc: "Use internal/service/organization instead of importing the store (EDM-4844)"

        store-repository-owners-only:
          list-mode: lax
          files:
            - "$all"
            - "!$test"
            - "!**/internal/service/repository/**"
            - "!**/internal/store/**"
            - "!**/cmd/**"
            - "!**/internal/migration/**"
            - "!**/internal/instrumentation/metrics/**"
            - "!**/internal/api_server/server.go"
            - "!**/internal/imagebuilder_api/server.go"
            - "!**/internal/periodic_checker/server.go"
            - "!**/internal/worker_server/server.go"
            - "!**/internal/imagebuilder_worker/worker.go"
            - "!**/test/**"
          deny:
            - pkg: "github.com/flightctl/flightctl/internal/store/repository$"
              desc: "Use internal/service/repository instead of importing the store (EDM-4844)"
            - pkg: "github.com/flightctl/flightctl/internal/store/repository/"
              desc: "Use internal/service/repository instead of importing the store (EDM-4844)"

        store-resourcesync-owners-only:
          list-mode: lax
          files:
            - "$all"
            - "!$test"
            - "!**/internal/service/resourcesync/**"
            - "!**/internal/store/**"
            - "!**/cmd/**"
            - "!**/internal/migration/**"
            - "!**/internal/instrumentation/metrics/**"
            - "!**/internal/api_server/server.go"
            - "!**/internal/periodic_checker/server.go"
            - "!**/test/**"
          deny:
            - pkg: "github.com/flightctl/flightctl/internal/store/resourcesync$"
              desc: "Use internal/service/resourcesync instead of importing the store (EDM-4844)"
            - pkg: "github.com/flightctl/flightctl/internal/store/resourcesync/"
              desc: "Use internal/service/resourcesync instead of importing the store (EDM-4844)"

        store-syncstate-owners-only:
          list-mode: lax
          files:
            - "$all"
            - "!$test"
            - "!**/internal/service/syncstate/**"
            - "!**/internal/store/**"
            - "!**/cmd/**"
            - "!**/internal/migration/**"
            - "!**/internal/instrumentation/metrics/**"
            - "!**/internal/periodic_checker/server.go"
            - "!**/test/**"
          deny:
            - pkg: "github.com/flightctl/flightctl/internal/store/syncstate$"
              desc: "Use internal/service/syncstate instead of importing the store (EDM-4844)"
            - pkg: "github.com/flightctl/flightctl/internal/store/syncstate/"
