version: "2"

run:
  concurrency: 4
  tests: true

output:
  formats:
    text:
      print-issued-lines: true
      print-linter-name: true

issues:
  uniq-by-line: true

linters:
  enable:
    - copyloopvar
    - depguard
    - errcheck
    - gocyclo
    - gosec
    - govet
    - ineffassign
    - misspell
    - nolintlint
    - staticcheck
    - unconvert
    - unused

  settings:
    staticcheck:
      checks:
        - "all"
        - "-QF*"
        - "-ST*"

    govet:
      settings:
        printf:
          funcs:
            - Infof
            - Warnf
            - Errorf
            - Fatalf

    gosec:
      excludes:
        - G101
        - G104
        - G115
        - G117
        - G118
        - G120
        - G122
        - G301
        - G302
        - G602
        - G702
        - G703
        - G704
        - G705

    nolintlint:
      allow-unused: true

    depguard:
      rules:
        main:
          deny:
            - pkg: "math/rand$"
              desc: "Use math/rand/v2 instead"

  exclusions:
    presets:
      - std-error-handling
      - common-false-positives
      - legacy
    rules:
      - text: 'declaration of "err" shadows declaration at'
        linters:
          - govet
      - text: "non-constant format string in call to"
        linters:
          - govet
    paths:
      - bin
      - deploy
      - docs
      - examples
      - hack
      - packaging
      - reports
      - internal/auth/issuer/pam

formatters:
  enable:
    - gci
    - gofmt
    - goimports
