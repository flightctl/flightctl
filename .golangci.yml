        store-templateversion-owners-only:
          list-mode: lax
          files:
            - "$all"
            - "!$test"
            - "!**/internal/service/templateversion/**"
            - "!**/internal/store/**"
            - "!**/cmd/**"
            - "!**/internal/migration/**"
            - "!**/internal/instrumentation/metrics/**"
            - "!**/internal/api_server/server.go"
            - "!**/internal/worker_server/server.go"
            - "!**/test/**"
          deny:
            - pkg: "github.com/flightctl/flightctl/internal/store/templateversion$"
              desc: "Use internal/service/templateversion instead of importing the store (EDM-4844)"
            - pkg: "github.com/flightctl/flightctl/internal/store/templateversion/"
              desc: "Use internal/service/templateversion instead of importing the store (EDM-4844)"

        store-vulnerabilityfinding-owners-only:
          list-mode: lax
          files:
            - "$all"
            - "!$test"
            - "!**/internal/service/vulnerabilityfinding/**"
            - "!**/internal/store/**"
            - "!**/cmd/**"
            - "!**/internal/migration/**"
            - "!**/internal/instrumentation/metrics/**"
            - "!**/internal/api_server/server.go"
            - "!**/internal/periodic_checker/server.go"
            - "!**/test/**"
          deny:
            - pkg: "github.com/flightctl/flightctl/internal/store/vulnerabilityfinding$"
              desc: "Use internal/service/vulnerabilityfinding instead of importing the store (EDM-4844)"
            - pkg: "github.com/flightctl/flightctl/internal/store/vulnerabilityfinding/"
              desc: "Use internal/service/vulnerabilityfinding instead of importing the store (EDM-4844)"

  exclusions:
    presets:
      - std-error-handling
      - common-false-positives
      - legacy
    rules:
      - text: 'declaration of "err" shadows declaration at'
        linters:
          - govet
      - text: "non-constant format string in call to"
        linters:
          - govet
    paths:
      - bin
      - deploy
      - docs
      - examples
      - hack
      - packaging
      - reports
      - internal/auth/issuer/pam

formatters:
  enable:
    - gci
    - gofmt
