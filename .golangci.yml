version: "2"

run:
  concurrency: 4
  tests: true

output:
  formats:
    text:
      print-issued-lines: true
      print-linter-name: true

issues:
  uniq-by-line: true

linters:
  enable:
    - copyloopvar
    - depguard
    - errcheck
    - gocyclo
    - gosec
    - govet
    - ineffassign
    - misspell
    - nolintlint
    - staticcheck
    - unconvert
    - unused

  settings:
    staticcheck:
      checks:
        - "all"
        - "-QF*"
        - "-ST*"

    govet:
      settings:
        printf:
          funcs:
            - Infof
            - Warnf
            - Errorf
            - Fatalf

    gosec:
      excludes:
        - G101
        - G104
        - G115
        - G117
        - G118
        - G120
        - G122
        - G301
        - G302
        - G602
        - G703
        - G704
        - G705

    nolintlint:
      allow-unused: true

    depguard:
      rules:
        main:
          deny:
            - pkg: "math/rand$"
              desc: "Use math/rand/v2 instead"

        service-no-api:
          list-mode: lax
          files:
            - "**/internal/service/**"
          deny:
            - pkg: "github.com/flightctl/flightctl/api$"
              desc: "Use internal/domain instead of api/ in service layer"
            - pkg: "github.com/flightctl/flightctl/api/"
              desc: "Use internal/domain instead of api/ in service layer"

        store-no-api:
          list-mode: lax
          files:
            - "**/internal/store/**"
          deny:
            - pkg: "github.com/flightctl/flightctl/api$"
              desc: "Use internal/domain instead of api/ in store layer"
            - pkg: "github.com/flightctl/flightctl/api/"
              desc: "Use internal/domain instead of api/ in store layer"

        imagebuilder-service-no-api:
          list-mode: lax
          files:
            - "**/internal/imagebuilder_api/service/**"
            - "!**/*_test.go"
          deny:
            - pkg: "github.com/flightctl/flightctl/api$"
              desc: "Use internal/imagebuilder_api/domain instead of api/ in imagebuilder service layer"
            - pkg: "github.com/flightctl/flightctl/api/"
              desc: "Use internal/imagebuilder_api/domain instead of api/ in imagebuilder service layer"

        imagebuilder-store-no-api:
          list-mode: lax
          files:
            - "**/internal/imagebuilder_api/store/**"
            - "!**/*_test.go"
          deny:
            - pkg: "github.com/flightctl/flightctl/api$"
              desc: "Use internal/imagebuilder_api/domain instead of api/ in imagebuilder store layer"
            - pkg: "github.com/flightctl/flightctl/api/"
              desc: "Use internal/imagebuilder_api/domain instead of api/ in imagebuilder store layer"

        imagebuilder-worker-no-api:
          list-mode: lax
          files:
            - "**/internal/imagebuilder_worker/**"
            - "!**/*_test.go"
          deny:
            - pkg: "github.com/flightctl/flightctl/api$"
              desc: "Use internal/imagebuilder_api/domain instead of api/ in imagebuilder worker"
            - pkg: "github.com/flightctl/flightctl/api/"
              desc: "Use internal/imagebuilder_api/domain instead of api/ in imagebuilder worker"

        test-no-k8s-client:
          list-mode: lax
          files:
            - "**/test/**"
            - "!**/test/e2e/infra/k8s/**"
          deny:
            - pkg: "k8s.io/client-go/"
              desc: "K8s client-go only in test/e2e/infra/k8s; use infra providers from tests"

        # EDM-4844: only the owning service (plus composition/migration/metrics
        # allowlists) may import each resource store package.
        store-authprovider-owners-only:
          list-mode: lax
          files:
            - "$all"
            - "!$test"
            - "!**/internal/service/authprovider/**"
            - "!**/internal/store/**"
            - "!**/cmd/**"
            - "!**/internal/migration/**"
            - "!**/internal/instrumentation/metrics/**"
            - "!**/internal/api_server/server.go"
            - "!**/internal/imagebuilder_api/server.go"
            - "!**/internal/remote_access_server/server.go"
            - "!**/test/**"
          deny:
            - pkg: "github.com/flightctl/flightctl/internal/store/authprovider$"
              desc: "Use internal/service/authprovider instead of importing the store (EDM-4844)"
            - pkg: "github.com/flightctl/flightctl/internal/store/authprovider/"
              desc: "Use internal/service/authprovider instead of importing the store (EDM-4844)"

        store-catalog-owners-only:
          list-mode: lax
          files:
            - "$all"
            - "!$test"
            - "!**/internal/service/catalog/**"
            - "!**/internal/store/**"
            - "!**/cmd/**"
            - "!**/internal/migration/**"
            - "!**/internal/instrumentation/metrics/**"
            - "!**/internal/api_server/server.go"
            - "!**/internal/api_server/agentserver/server.go"
            - "!**/internal/imagebuilder_api/server.go"
            - "!**/internal/remote_access_server/server.go"
            - "!**/internal/periodic_checker/server.go"
            - "!**/internal/imagebuilder_worker/worker.go"
            - "!**/test/**"
          deny:
            - pkg: "github.com/flightctl/flightctl/internal/store/catalog$"
              desc: "Use internal/service/catalog instead of importing the store (EDM-4844)"
            - pkg: "github.com/flightctl/flightctl/internal/store/catalog/"
              desc: "Use internal/service/catalog instead of importing the store (EDM-4844)"

        store-certificatesigningrequest-owners-only:
          list-mode: lax
          files:
            - "$all"
            - "!$test"
            - "!**/internal/service/certificatesigningrequest/**"
            - "!**/internal/store/**"
            - "!**/cmd/**"
            - "!**/internal/migration/**"
            - "!**/internal/instrumentation/metrics/**"
            - "!**/internal/api_server/server.go"
            - "!**/internal/api_server/agentserver/server.go"
            - "!**/internal/imagebuilder_worker/worker.go"
            - "!**/test/**"
          deny:
            - pkg: "github.com/flightctl/flightctl/internal/store/certificatesigningrequest$"
              desc: "Use internal/service/certificatesigningrequest instead of importing the store (EDM-4844)"
            - pkg: "github.com/flightctl/flightctl/internal/store/certificatesigningrequest/"
              desc: "Use internal/service/certificatesigningrequest instead of importing the store (EDM-4844)"

        store-checkpoint-owners-only:
          list-mode: lax
          files:
            - "$all"
            - "!$test"
            - "!**/internal/service/checkpoint/**"
            - "!**/internal/store/**"
            - "!**/cmd/**"
            - "!**/internal/migration/**"
            - "!**/internal/instrumentation/metrics/**"
            - "!**/internal/periodic_checker/server.go"
            - "!**/test/**"
          deny:
            - pkg: "github.com/flightctl/flightctl/internal/store/checkpoint$"
              desc: "Use internal/service/checkpoint instead of importing the store (EDM-4844)"
            - pkg: "github.com/flightctl/flightctl/internal/store/checkpoint/"
              desc: "Use internal/service/checkpoint instead of importing the store (EDM-4844)"

        store-dependencyref-owners-only:
