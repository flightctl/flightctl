            - "!**/internal/service/dependencyref/**"
            - "!**/internal/store/**"
            - "!**/cmd/**"
            - "!**/internal/migration/**"
            - "!**/internal/instrumentation/metrics/**"
            - "!**/internal/periodic_checker/server.go"
            - "!**/internal/worker_server/server.go"
            - "!**/test/**"
          deny:
            - pkg: "github.com/flightctl/flightctl/internal/store/dependencyref$"
              desc: "Use internal/service/dependencyref instead of importing the store (EDM-4844)"
            - pkg: "github.com/flightctl/flightctl/internal/store/dependencyref/"
