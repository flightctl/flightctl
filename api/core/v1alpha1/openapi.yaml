components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    orgId:
      type: apiKey
      in: query
      name: org_id
      description: The UUID of the organization that owns the resource. Maps to an organizations metadata.name.
  schemas:
    ApiVersion:
      type: string
      x-go-type: string
      description: 'APIVersion defines the versioned schema of this representation of an object. Servers should convert recognized schemas to the latest internal value, and may reject unrecognized values. More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources.'
      enum:
        - v1alpha1
        - flightctl.io/v1alpha1
      x-enum-varnames:
        - ApiVersionV1alpha1
        - ApiVersionFlightctlIoV1alpha1
    SemVer:
      type: string
      x-go-type: string
      description: 'Semantic version identifier (e.g., 1.2.3, 2.0.0-rc1)'
      pattern: '^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(?:-((?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*)(?:\.(?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*))*))?(?:\+([0-9a-zA-Z-]+(?:\.[0-9a-zA-Z-]+)*))?$'
      example: "1.2.3"
    SemVerRange:
      type: string
      x-go-type: string
      description: 'Semver range constraint (e.g., >=1.0.0 <2.0.0). Space-separated terms, each with optional operator (>=, <=, >, <, =, ~, ^) followed by a version.'
      pattern: '^[>=<~^]*[0-9]+\.[0-9]+(\.[0-9]+)?(-[0-9a-zA-Z.-]+)?(\+[0-9a-zA-Z.-]+)?( [>=<~^]*[0-9]+\.[0-9]+(\.[0-9]+)?(-[0-9a-zA-Z.-]+)?(\+[0-9a-zA-Z.-]+)?)*$'
      example: ">=1.0.0 <2.0.0"
    # Catalog-specific schemas (shared types come from v1beta1 via external refs)
    Catalog:
      type: object
      properties:
        apiVersion:
          $ref: '#/components/schemas/ApiVersion'
        kind:
          type: string
          description: 'Kind is a string value representing the REST resource this object represents. Servers may infer this from the endpoint the client submits requests to. Cannot be updated. In CamelCase. More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds.'
        metadata:
          $ref: '../v1beta1/openapi.yaml#/components/schemas/ObjectMeta'
        spec:
          $ref: '#/components/schemas/CatalogSpec'
        status:
          $ref: '#/components/schemas/CatalogStatus'
      required:
        - apiVersion
        - kind
        - metadata
        - spec
      additionalProperties: false
      example:
        apiVersion: flightctl.io/v1alpha1
        kind: Catalog
        metadata:
          name: edge-apps
        spec:
          displayName: Edge Applications
    CatalogSpec:
      type: object
      description: CatalogSpec describes the configuration of a catalog. Catalogs are containers for locally-managed CatalogItems.
      properties:
        displayName:
          type: string
          description: Human-readable display name shown in catalog listings.
        shortDescription:
          type: string
          description: A brief one-line description of the catalog.
        icon:
          type: string
          description: URL or data URI of the catalog icon for display in UI.
        provider:
          type: string
          description: Provider or publisher of the catalog (company or team name).
        support:
          type: string
          description: Link to support resources or documentation for getting help.
      additionalProperties: false
    CatalogStatus:
      type: object
      description: CatalogStatus represents the current status of a catalog source.
      properties:
        conditions:
          type: array
          description: Current state of the catalog source.
          items:
            $ref: '../v1beta1/openapi.yaml#/components/schemas/Condition'
      required:
        - conditions
      additionalProperties: false
    CatalogList:
      type: object
      description: CatalogList is a list of Catalogs.
      properties:
        apiVersion:
          $ref: '#/components/schemas/ApiVersion'
        kind:
          type: string
          description: 'Kind is a string value representing the REST resource this object represents. Servers may infer this from the endpoint the client submits requests to. Cannot be updated. In CamelCase. More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds.'
        metadata:
          $ref: '../v1beta1/openapi.yaml#/components/schemas/ListMeta'
        items:
          type: array
          description: 'List of Catalogs.'
          items:
            $ref: '#/components/schemas/Catalog'
      required:
        - apiVersion
        - kind
        - metadata
        - items
      additionalProperties: false
    CatalogItemMeta:
      type: object
      description: 'Metadata for CatalogItem resources. Extends ObjectMeta with catalog scoping.'
      allOf:
        - $ref: '../v1beta1/openapi.yaml#/components/schemas/ObjectMeta'
        - type: object
          properties:
            catalog:
              type: string
              description: 'The catalog this item belongs to. Similar to namespace in Kubernetes.'
              example: edge-apps
          required:
            - catalog
      # Note: No additionalProperties: false here because this schema is used in allOf compositions
      # with ObjectMeta. Setting additionalProperties: false would prevent the composition from working
      # properly and would reject valid ObjectMeta fields like name, labels, annotations, etc.
    CatalogItem:
      type: object
      description: CatalogItem represents an application template from a catalog. It provides default configuration values that can be customized when adding the application to a fleet.
      properties:
        apiVersion:
          $ref: '#/components/schemas/ApiVersion'
        kind:
          type: string
          description: 'Kind is a string value representing the REST resource this object represents.'
        metadata:
          $ref: '#/components/schemas/CatalogItemMeta'
        spec:
          $ref: '#/components/schemas/CatalogItemSpec'
      required:
        - apiVersion
        - kind
        - metadata
        - spec
      additionalProperties: false
    CatalogItemArtifact:
      type: object
      description: 'An artifact reference. The type field is the discriminator and must be unique within the artifacts list.'
      properties:
        type:
          $ref: '#/components/schemas/CatalogItemArtifactType'
        name:
          type: string
          description: 'Optional human-readable display name for this artifact.'
          example: QCOW2 Disk Image
        uri:
          type: string
          minLength: 1
          description: 'Artifact URI without version qualifier. The version reference (tag or digest) is applied at resolution time.'
          example: quay.io/redhat/rhel-bootc-qcow2
      required:
        - type
        - uri
      additionalProperties: false
    CatalogItemArtifactType:
      type: string
      description: 'Artifact format discriminator. Must be unique within the artifacts list. Includes bootc-image-builder output formats.'
      example: container
      enum:
        - container
        - qcow2
        - ami
        - iso
        - anaconda-iso
        - vmdk
        - vhd
        - raw
        - gce
      x-enum-varnames:
        - CatalogItemArtifactTypeContainer
        - CatalogItemArtifactTypeQcow2
        - CatalogItemArtifactTypeAmi
        - CatalogItemArtifactTypeIso
        - CatalogItemArtifactTypeAnacondaIso
        - CatalogItemArtifactTypeVmdk
        - CatalogItemArtifactTypeVhd
        - CatalogItemArtifactTypeRaw
        - CatalogItemArtifactTypeGce
    CatalogItemConfigurable:
      type: object
      description: 'Configuration fields that can be specified at item level (as defaults) and overridden at version level. Version-level values fully replace item-level values (not merged).'
      properties:
        config:
          type: object
          additionalProperties: true
          description: 'Configuration values (envVars, ports, volumes, resources, etc.).'
          example:
            envVars:
              LOG_LEVEL: info
            ports:
              - "9090:9090"
        configSchema:
          type: object
          additionalProperties: true
          description: 'JSON Schema defining configurable parameters and their validation.'
        readme:
          type: string
          description: 'Detailed documentation, preferably in markdown format.'
      # Note: No additionalProperties: false here because this schema is used in allOf compositions
      # (e.g., CatalogItemVersion) where other schemas add their own properties. Setting
      # additionalProperties: false would prevent the composition from working properly.
    CatalogItemSpec:
      type: object
      description: CatalogItemSpec defines the configuration for a catalog item.
      properties:
        category:
          $ref: '#/components/schemas/CatalogItemCategory'
        type:
          $ref: '#/components/schemas/CatalogItemType'
        artifacts:
          type: array
          items:
            $ref: '#/components/schemas/CatalogItemArtifact'
          minItems: 1
          description: 'Artifact definitions for this catalog item. Defined once; version references resolve each artifact independently. Type must be unique within the list.'
          example:
            - type: container
              uri: quay.io/prometheus/prometheus
        versions:
          type: array
          items:
            $ref: '#/components/schemas/CatalogItemVersion'
          description: 'Available versions using Cincinnati model. Use replaces for primary edge, skips when stable channel skips intermediate versions.'
          example:
            - version: "2.45.0"
              references:
                container: "sha256:a3ed95caeb02ffe68cdd9fd84406680ae93d633cb16422d00e8a7c22955b46d4"
              channels: [stable, fast]
              replaces: "2.44.0"
              skips: ["2.43.0"]
            - version: "2.44.0"
              references:
                container: "v2.44.0"
              channels: [fast]
              replaces: "2.43.0"
        defaults:
          $ref: '#/components/schemas/CatalogItemConfigurable'
        displayName:
          type: string
          description: Human-readable display name shown in catalog listings.
        shortDescription:
          type: string
          description: A brief one-line description of the catalog item.
        icon:
          type: string
          description: URL or data URI of the catalog item icon for display in UI.
        deprecation:
          $ref: '#/components/schemas/CatalogItemDeprecation'
        provider:
          type: string
          description: Provider or publisher of the catalog item (company or team name).
        support:
          type: string
          description: Link to support resources or documentation for getting help.
        homepage:
          type: string
          description: The homepage URL for the catalog item project.
        documentationUrl:
          type: string
          description: Link to external documentation.
      required:
        - type
        - artifacts
        - versions
      additionalProperties: false
    CatalogItemVersion:
      type: object
      description: |
        A version of a catalog item following the Cincinnati model where versions
        are nodes in an upgrade graph and channels are labels on those nodes.
        Upgrade edges are defined by replaces (single), skips (multiple), or
        skipRange (semver range). Includes CatalogItemConfigurable fields that
        override item-level defaults.
      allOf:
        - $ref: '#/components/schemas/CatalogItemConfigurable'
        - type: object
          properties:
            version:
              allOf:
                - $ref: '#/components/schemas/SemVer'
              description: 'Semantic version identifier (e.g., 1.2.3, 2.0.0-rc1). Required for version ordering and upgrade graph.'
              example: "2.45.0"
            references:
              type: object
              minProperties: 1
              additionalProperties:
                type: string
                minLength: 1
              description: 'Map of artifact type to image tag or digest. Keys must match a type in spec.artifacts. Only keyed artifacts are available for this version.'
              example:
                container: "sha256:a3ed95caeb02ffe68cdd9fd84406680ae93d633cb16422d00e8a7c22955b46d4"
                qcow2: "v2.45.0"
            channels:
              type: array
              minItems: 1
              items:
                type: string
              description: 'Channels this version belongs to.'
            replaces:
              allOf:
                - $ref: '#/components/schemas/SemVer'
              description: 'The single version this one replaces, defining the primary upgrade edge.'
            skips:
              type: array
              items:
                $ref: '#/components/schemas/SemVer'
              description: 'Additional versions that can upgrade directly to this one. Use when stable channel skips intermediate fast-only versions.'
              example: ["1.0.0", "1.1.0"]
            skipRange:
              allOf:
                - $ref: '#/components/schemas/SemVerRange'
              description: 'Semver range of versions that can upgrade directly to this one. Use for z-stream updates or hotfixes.'
              example: ">=1.0.0 <1.3.0"
            deprecation:
              $ref: '#/components/schemas/CatalogItemDeprecation'
          required:
            - version
            - channels
            - references
    CatalogItemList:
      type: object
      description: CatalogItemList is a list of CatalogItems.
      properties:
        apiVersion:
          $ref: '#/components/schemas/ApiVersion'
        kind:
          type: string
          description: 'Kind is a string value representing the REST resource this object represents. Servers may infer this from the endpoint the client submits requests to. Cannot be updated. In CamelCase. More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds.'
        metadata:
          $ref: '../v1beta1/openapi.yaml#/components/schemas/ListMeta'
        items:
          type: array
          description: 'List of CatalogItems.'
          items:
            $ref: '#/components/schemas/CatalogItem'
      required:
        - apiVersion
        - kind
        - metadata
        - items
      additionalProperties: false
    CatalogItemCategory:
      type: string
      description: 'Category of a catalog item.'
      enum:
        - system
        - application
      default: application
      x-enum-varnames:
        - CatalogItemCategorySystem
        - CatalogItemCategoryApplication
    CatalogItemType:
      type: string
      description: 'Type of catalog item within its category.'
      enum:
        # System category types
        - os
        - firmware
        - driver
        # Application category types
        - container
        - helm
        - quadlet
        - compose
        - data
      x-enum-varnames:
        - CatalogItemTypeOS
        - CatalogItemTypeFirmware
        - CatalogItemTypeDriver
        - CatalogItemTypeContainer
        - CatalogItemTypeHelm
        - CatalogItemTypeQuadlet
        - CatalogItemTypeCompose
        - CatalogItemTypeData
    CatalogItemDeprecation:
      type: object
      description: 'Deprecation information for a catalog item or version. Presence indicates deprecated status.'
      properties:
        message:
          type: string
          description: 'Required message explaining why this is deprecated and what to do instead.'
          example: "This item is deprecated. Use nginx-plus instead."
        replacement:
          type: string
          description: 'Optional name of the replacement catalog item (item-level only).'
          example: nginx-plus
      required:
        - message
      additionalProperties: false
    Status:
      type: object
      properties:
        apiVersion:
          $ref: '#/components/schemas/ApiVersion'
        kind:
          type: string
          description: 'Kind is a string value representing the REST resource this object represents. Servers may infer this from the endpoint the client submits requests to. Cannot be updated. In CamelCase. More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds.'
        code:
          type: integer
          format: int32
          description: Suggested HTTP return code for this status, 0 if not set.
        message:
          type: string
          description: A human-readable description of the status of this operation.
        reason:
          type: string
          description: A machine-readable description of why this operation is in the "Failure" status. If this value is empty there is no information available. A Reason clarifies an HTTP status code but does not override it.
        status:
          type: string
          description: 'Status of the operation. One of: "Success" or "Failure". More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#spec-and-status.'
      description: Status is a return value for calls that don't return other objects.
      required:
        - apiVersion
        - kind
        - status
        - code
        - reason
        - message
      additionalProperties: false
    VulnerabilitySummaryResponse:
      type: object
      description: Estate-wide vulnerability summary counts.
      additionalProperties: false
      required:
        - apiVersion
        - kind
        - cvesBySeverity
      properties:
        apiVersion:
          $ref: '#/components/schemas/ApiVersion'
        kind:
          type: string
          description: Resource kind; always VulnerabilitySummary.
        cvesBySeverity:
          $ref: '#/components/schemas/CveCountsBySeverity'
    DeviceCountsBySeverity:
      type: object
      description: Counts of distinct devices affected in the organization, grouped by vulnerability severity.
      additionalProperties: false
      required:
        - total
        - critical
        - high
        - medium
        - low
        - none
        - unknown
      properties:
        total:
          type: integer
          format: int64
          description: Number of distinct devices with at least one vulnerability finding in the organization.
        critical:
          type: integer
          format: int64
          description: Number of devices whose highest severity finding is critical.
        high:
          type: integer
          format: int64
          description: Number of devices whose highest severity finding is high.
        medium:
          type: integer
          format: int64
          description: Number of devices whose highest severity finding is medium.
        low:
          type: integer
          format: int64
          description: Number of devices whose highest severity finding is low.
        none:
          type: integer
          format: int64
          description: Number of devices whose highest severity finding is none.
        unknown:
          type: integer
          format: int64
          description: Number of devices whose highest severity finding is unknown.
    CveCountsBySeverity:
      type: object
      description: Counts of distinct CVEs in the organization by highest severity.
      additionalProperties: false
      required:
        - total
        - critical
        - high
        - medium
        - low
        - none
        - unknown
      properties:
        total:
          type: integer
          format: int64
          description: Total distinct CVEs across the organization.
        critical:
          type: integer
          format: int64
          description: Count of distinct Critical CVEs.
        high:
          type: integer
          format: int64
          description: Count of distinct High CVEs.
        medium:
          type: integer
          format: int64
          description: Count of distinct Medium CVEs.
        low:
          type: integer
          format: int64
          description: Count of distinct Low CVEs.
        none:
          type: integer
          format: int64
          description: Count of distinct CVEs with no exploitable impact (CVSS score 0).
        unknown:
          type: integer
          format: int64
          description: Count of distinct CVEs with unknown or unscored severity.
    Vulnerability:
      type: object
      description: A single vulnerability (CVE) finding. Vulnerabilities are global CVE records from Trustify; they are not tenant-owned resources. Tenancy is determined by the device or fleet context through which they are queried.
      additionalProperties: false
      required:
        - apiVersion
        - kind
        - cveId
        - severity
      properties:
        apiVersion:
          $ref: '#/components/schemas/ApiVersion'
        kind:
          type: string
          description: 'Kind is a string value representing the REST resource this object represents. Always Vulnerability.'
        cveId:
          type: string
          description: CVE identifier (e.g. CVE-2024-1234).
        advisoryId:
          type: string
          description: Vendor advisory identifier when available.
        issuer:
          type: string
          description: Name of the advisory issuer (e.g. Red Hat, NVD) when known.
        link:
          type: string
          description: URL to the CVE details page. Points to Red Hat Security portal for Red Hat advisories, otherwise to NVD.
        severity:
          type: string
          description: Normalized severity label.
          enum: [Critical, High, Medium, Low, None, Unknown]
        cvssScore:
          type: number
          format: float
          description: CVSS base score when available.
        description:
          type: string
          description: Short summary of the vulnerability.
        publishedAt:
          type: string
          format: date-time
          description: Advisory publish time when known.
        image:
          type: string
          description: Image reference (name or URL) from the device context.
        imageDigest:
          type: string
          description: Immutable image digest from the device context.
        affectedDevices:
          type: integer
          format: int64
          description: Distinct devices affected by this CVE. For device context this is always 1; for fleet context it is the number of devices in the fleet running an image with this CVE; for organization-wide context it is the count across the whole organization.
    VulnerabilityList:
      type: object
      description: Paginated list of Vulnerability resources.
      additionalProperties: false
      required:
        - apiVersion
        - kind
        - metadata
        - items
      properties:
        apiVersion:
          $ref: '#/components/schemas/ApiVersion'
        kind:
          type: string
          description: 'Kind is a string value representing the REST resource this object represents. Always VulnerabilityList.'
        metadata:
          $ref: '../v1beta1/openapi.yaml#/components/schemas/ListMeta'
        items:
          type: array
          description: Paginated Vulnerability resources for this page.
          items:
            $ref: '#/components/schemas/Vulnerability'
    VulnerabilityImageRef:
      type: object
      description: Reference to an OS or workload image by name and digest.
      additionalProperties: false
      required:
        - image
        - imageDigest
      properties:
        image:
          type: string
          description: Image reference (name or URL).
        imageDigest:
          type: string
          description: Immutable image digest.
        affectedDevices:
          type: integer
          format: int64
          description: Devices running this exact image digest within the parent scope (fleet or blast radius row).
    VulnerabilityGroupItem:
      type: object
      description: A single CVE finding for a specific image digest, including all image refs that resolve to that digest.
      additionalProperties: false
      required:
        - imageDigest
        - severity
        - imageRefs
      properties:
        imageDigest:
          type: string
          description: Immutable image digest.
        imageRefs:
          type: array
          description: Image references observed for this digest within the query scope.
          items:
            type: string
        severity:
          type: string
          description: Severity of this CVE for this digest.
          enum: [Critical, High, Medium, Low, None, Unknown]
        cvssScore:
          type: number
          format: float
          description: CVSS base score when available.
        advisoryId:
          type: string
          description: Vendor advisory identifier when available.
        issuer:
          type: string
          description: Name of the advisory issuer (e.g. Red Hat, NVD) when known.
        link:
          type: string
          description: URL to the CVE details page. Points to Red Hat Security portal for Red Hat advisories, otherwise to NVD.
        description:
          type: string
          description: Short summary of the vulnerability.
        publishedAt:
          type: string
          format: date-time
          description: Advisory publish time when known.
        affectedDevices:
          type: integer
          format: int64
          description: Number of devices in scope running this digest.
        firstSeenAt:
          type: string
          format: date-time
          description: When this CVE was first observed in this digest.
    VulnerabilityGroup:
      type: object
      description: >
        A CVE grouped across one or more images, as returned by fleet-scoped and organization-wide
        vulnerability list endpoints. Each finding represents one image in which the CVE was
        detected.
      additionalProperties: false
      required:
        - apiVersion
        - kind
        - cveId
        - severity
        - findings
      properties:
        apiVersion:
          $ref: '#/components/schemas/ApiVersion'
        kind:
          type: string
          description: 'Kind is a string value representing the REST resource. Always VulnerabilityGroup.'
        cveId:
          type: string
          description: CVE identifier (e.g. CVE-2024-1234).
        severity:
          type: string
          description: Worst severity across all findings in this group.
          enum: [Critical, High, Medium, Low, None, Unknown]
        maxCvssScore:
          type: number
          format: float
          description: Highest CVSS base score across all findings.
        maxPublishedAt:
          type: string
          format: date-time
          description: Latest advisory publish time across all findings.
        affectedDevices:
          type: integer
          format: int64
          description: Total distinct devices affected by this CVE within scope.
        findings:
          type: array
          description: Per-digest findings for this CVE within the query scope.
          items:
            $ref: '#/components/schemas/VulnerabilityGroupItem'
    VulnerabilityGroupList:
      type: object
      description: Paginated list of VulnerabilityGroup resources (fleet-scoped or organization-wide).
      additionalProperties: false
      required:
        - apiVersion
        - kind
        - metadata
        - items
      properties:
        apiVersion:
          $ref: '#/components/schemas/ApiVersion'
        kind:
          type: string
          description: 'Kind is a string value representing the REST resource. Always VulnerabilityGroupList.'
        metadata:
          $ref: '../v1beta1/openapi.yaml#/components/schemas/ListMeta'
        items:
          type: array
          description: Paginated VulnerabilityGroup resources for this page.
          items:
            $ref: '#/components/schemas/VulnerabilityGroup'
    DeviceVulnerabilitySummaryResponse:
      type: object
      description: Severity summary for a single device.
      additionalProperties: false
      required:
        - apiVersion
        - kind
        - summary
      properties:
        apiVersion:
          $ref: '#/components/schemas/ApiVersion'
        kind:
          type: string
          description: Resource kind; always DeviceVulnerabilitySummary.
        image:
          type: string
          description: Image reference from device status. Absent when the device has no rendered OS image.
        imageDigest:
          type: string
          description: Image digest from device status. Absent when the device has no rendered OS image.
        summary:
          $ref: '#/components/schemas/VulnerabilitySeveritySummary'
    FleetVulnerabilitySummaryResponse:
      type: object
      description: Severity summary for a single fleet.
      additionalProperties: false
      required:
        - apiVersion
        - kind
        - summary
      properties:
        apiVersion:
          $ref: '#/components/schemas/ApiVersion'
        kind:
          type: string
          description: Resource kind; always FleetVulnerabilitySummary.
        summary:
          $ref: '#/components/schemas/FleetVulnerabilitySummary'
    VulnerabilitySeveritySummary:
      type: object
      description: Total vulnerability counts by severity for the full result set (not only the current page).
      additionalProperties: false
      required:
        - total
        - critical
        - high
        - medium
        - low
        - none
        - unknown
      properties:
        total:
          type: integer
          format: int64
          description: Total vulnerabilities across all severities for the full result set.
        critical:
          type: integer
          format: int64
          description: Count of Critical severity findings in the full result set.
        high:
          type: integer
          format: int64
          description: Count of High severity findings in the full result set.
        medium:
          type: integer
          format: int64
          description: Count of Medium severity findings in the full result set.
        low:
          type: integer
          format: int64
          description: Count of Low severity findings in the full result set.
        none:
          type: integer
          format: int64
          description: Count of findings with no exploitable impact (CVSS score 0).
        unknown:
          type: integer
          format: int64
          description: Count of findings with unknown or unscored severity.
    FleetVulnerabilitySummary:
      description: Fleet vulnerability totals including unique digest count.
      allOf:
        - $ref: '#/components/schemas/VulnerabilitySeveritySummary'
        - type: object
          additionalProperties: false
          required:
            - uniqueDigests
          properties:
            uniqueDigests:
              type: integer
              format: int64
              description: Distinct image digests observed in the fleet.
    VulnerabilityImpact:
      type: object
      description: Blast radius for a single CVE across fleets and fleetless devices.
      additionalProperties: false
      required:
        - apiVersion
        - kind
        - metadata
        - cveId
        - severity
        - items
      properties:
        apiVersion:
          $ref: '#/components/schemas/ApiVersion'
        kind:
          type: string
          description: Resource kind; always VulnerabilityImpact.
        metadata:
          $ref: '../v1beta1/openapi.yaml#/components/schemas/ListMeta'
        cveId:
          type: string
          description: CVE identifier for this blast radius response.
        issuer:
          type: string
          description: Name of the advisory issuer (e.g. Red Hat, NVD) when known.
        link:
          type: string
          description: URL to the CVE details page. Points to Red Hat Security portal for Red Hat advisories, otherwise to NVD.
        severity:
          type: string
          description: Worst severity for this CVE in the fleet or fleetless group.
          enum: [Critical, High, Medium, Low, None, Unknown]
        maxCvssScore:
          type: number
          format: float
          description: Highest CVSS base score for this CVE in the fleet or fleetless group.
        maxPublishedAt:
          type: string
          format: date-time
          description: When this CVE was first observed in the fleet or fleetless group.
        items:
          type: array
          description: Per-fleet or fleetless rows with device and image counts.
          items:
            $ref: '#/components/schemas/AffectedFleet'
    AffectedFleet:
      type: object
      description: One fleet or the fleetless aggregate with device and image counts for a CVE.
      additionalProperties: false
      required:
        - fleetName
        - fleetless
        - affectedDevices
        - findings
      properties:
        fleetName:
          type: string
          description: Fleet metadata.name, empty for the fleetless aggregate.
        fleetless:
          type: boolean
          description: True when this row represents devices not owned by a fleet.
        affectedDevices:
          type: integer
          format: int64
          description: Devices in this fleet or fleetless group affected by the CVE.
        findings:
          type: array
          description: Per-digest findings within this fleet or fleetless group.
          items:
            $ref: '#/components/schemas/VulnerabilityGroupItem'
