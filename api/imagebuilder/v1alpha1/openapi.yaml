        - version

    NewCatalogItemTarget:
      description: Publish target that creates a new CatalogItem. Rejected immediately if a CatalogItem with the given catalogItemName already exists.
      allOf:
        - $ref: '#/components/schemas/ImagePromotionTargetBase'
        - type: object
          additionalProperties: false
          properties:
            type:
              type: string
              enum: [NewCatalogItem]
              description: Discriminator for the target type.
            catalogName:
              type: string
              description: Name of the parent Catalog resource.
            catalogItemName:
              type: string
              description: Name of the CatalogItem to create.
            version:
              type: string
              description: Semver version string for the new CatalogItem version entry.
            readme:
              type: string
              description: Optional item-level readme for the new CatalogItem. Markdown is supported.
            displayName:
              type: string
              description: Optional human-readable display name for the new CatalogItem.

    ExistingCatalogItemTarget:
      description: Publish target that appends a version to an existing CatalogItem. Rejected immediately if the CatalogItem does not exist.
      allOf:
        - $ref: '#/components/schemas/ImagePromotionTargetBase'
        - type: object
          additionalProperties: false
          properties:
            type:
              type: string
              enum: [ExistingCatalogItem]
              description: Discriminator for the target type.
            catalogName:
              type: string
              description: Name of the parent Catalog resource.
            catalogItemName:
              type: string
              description: Name of the CatalogItem to update.
            version:
              type: string
              description: Semver version string for the new CatalogItem version entry.
            readme:
              type: string
              description: Optional version-level readme for this version entry. Markdown is supported.
            replaces:
              type: string
              description: The single version this one replaces, defining the primary upgrade edge.
            skips:
              type: array
              items:
                type: string
              description: Additional versions that can upgrade directly to this one.
            skipRange:
              type: string
              description: Semver range of versions that can upgrade directly to this one (e.g. ">=1.0.0 <1.3.0").

    ImagePromotionStatus:
      type: object
      description: Observed state of an ImagePromotion resource.
      properties:
        conditions:
          type: array
          description: Conditions describing the current state of the promotion lifecycle.
          items:
            $ref: '#/components/schemas/ImagePromotionCondition'
        publishedAt:
          type: string
          format: date-time
          description: >-
            Timestamp of the initial successful promotion. Set once when the promotion first
            reaches Completed state. Not updated by subsequent amendments.
        lastAmendedAt:
          type: string
          format: date-time
          description: >-
            Timestamp of the most recent successful amendment (i.e., when the last additional
            export format was written to the CatalogItemVersion). Absent if the promotion has
            never been amended.
        artifactStatuses:
          type: array
          description: >-
            Per-artifact readiness summary. One entry for the ImageBuild (container artifact)
            and one entry per requested exportFormat. Updated as artifacts become available
            or as new formats are added via PATCH/PUT.
          items:
            $ref: '#/components/schemas/ArtifactPromotionStatus'

    ArtifactPromotionStatus:
      type: object
      properties:
        format:
          type: string
          description: Artifact format. "container" for the ImageBuild artifact; one of the exportFormats values for additional artifacts.
        ready:
          type: boolean
          description: True when at least one successful artifact of this format is available.
        published:
          type: boolean
          description: >-
            True when this format's artifact reference has been successfully written to the
            CatalogItemVersion. For the initial publish, all formats are published atomically.
            For amendments, formats added via PATCH/PUT start as published=false and transition to
            published=true when their CatalogItem patch succeeds.
        resolvedExport:
          type: string
          description: Name of the ImageExport resource that will be (or was) used for this format. Absent for the container artifact and for formats not yet ready.
      required:
        - format
        - ready
        - published
      additionalProperties: false

    ImagePromotionCondition:
      description: Condition for ImagePromotion resources.
      allOf:
        - $ref: '../../core/v1beta1/openapi.yaml#/components/schemas/ConditionBase'
        - type: object
          required:
            - type
          properties:
            type:
              $ref: '#/components/schemas/ImagePromotionConditionType'

    ImagePromotionConditionType:
      type: string
      description: Type of ImagePromotion condition.
      enum:
        - Ready
      x-enum-varnames:
        - ImagePromotionConditionTypeReady

    ImagePromotionConditionReason:
      type: string
      description: Reason for the ImagePromotion Ready condition.
      enum:
        - WaitingForArtifacts
        - Publishing
        - Completed
        - Failed
        - BuildFailed
        - BuildCanceled
        - AmendmentFailed
      x-enum-varnames:
        - ImagePromotionConditionReasonWaitingForArtifacts
        - ImagePromotionConditionReasonPublishing
        - ImagePromotionConditionReasonCompleted
        - ImagePromotionConditionReasonFailed
        - ImagePromotionConditionReasonBuildFailed
        - ImagePromotionConditionReasonBuildCanceled
        - ImagePromotionConditionReasonAmendmentFailed

    ImagePromotionTargetType:
      type: string
      description: Discriminator for the promotion target type.
      enum:
        - NewCatalogItem
        - ExistingCatalogItem
      x-enum-varnames:
        - ImagePromotionTargetTypeNewCatalogItem
        - ImagePromotionTargetTypeExistingCatalogItem


