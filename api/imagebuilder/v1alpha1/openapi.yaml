      type: string
      description: Type of ImageBuild condition.
      enum:
        - Ready
      x-enum-varnames:
        - ImageBuildConditionTypeReady
    ImageBuildConditionReason:
      type: string
      description: Reason for the ImageBuild Ready condition.
      enum:
