syntax = "proto3";

package flightctl.v1;

option go_package = "github.com/flightctl/flightctl/api/grpc/v1/grpc-v1";


service RouterService {
  // Stream connects caller to another caller of the same stream
  // in the call context we expect:
  // - the stream ID
  rpc Stream(stream StreamRequest) returns (stream StreamResponse);
}

message StreamRequest {
  bytes payload = 1;
  bool closed = 2;
  // error carries a session-level failure (e.g. the requested application does not
  // exist) that the server must not relay as console payload data. When set, this is
  // the only meaningful field on the message and the stream is expected to close
  // immediately after.
  string error = 3;
}

message StreamResponse {
  bytes payload = 1;
  bool closed = 2;
}