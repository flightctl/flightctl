global:
  # The base domain for the deployment, from which the service FQDNs are derived.
  # If provided, must be a fully qualified domain name (FQDN) like "example.com" or a hostname that resolves via DNS.
  # If not provided, defaults to the system's hostname FQDN ('hostname -f').
  baseDomain:

  # Certificate generation method - 'none' or 'builtin'
  # - none: Do not generate certificates. User must provide certs in /etc/flightctl/pki/ or the service will fail to start.
  # - builtin: Generate a self-signed CA cert in /etc/flightctl/pki/ca.{crt,key}, unless the user already provided that CA.
  #            Generate the remaining certificates from the CA cert (default)
  generateCertificates: builtin
  auth:
    type: oidc # oidc, aap, oauth2, or none
    insecureSkipTlsVerify: true
    aap:
      enabled: true
      apiUrl:
      authorizationUrl:
      tokenUrl:
      clientId:
      clientSecret:
      token:
      appName:
      organizationId:
      scopes:
        - read
        - write
    oidc:
      clientId: flightctl-client
      clientSecret:  # Optional: Client secret for OIDC provider (injected by token proxy)
      enabled: true
      issuer:
      externalOidcAuthority:
      # scopes:
      #   - openid
      #   - profile
      #   - email
      #   - roles
      #   - offline_access
      organizationAssignment:
        type: dynamic
        claimPath:
          - organizations
      usernameClaim:
        - preferred_username
      roleAssignment:
        type: dynamic
        separator: ":"
        claimPath:
          - roles
    pamOidcIssuer:
      enabled: true
      # OIDC issuer URL - must include /api/v1/auth path. Leave empty to auto-configure as https://${global.baseDomain}:8444/api/v1/auth
      issuer:
      clientId: flightctl-client
      clientSecret:
      scopes:
        - openid
        - profile
        - email
        - roles
        - offline_access
      pamService: flightctl
  ui:
    # Whether flightctl-ui trusts X-Forwarded-* headers from trusted proxies.
    # Set to true when the UI sits behind a trusted reverse proxy or ingress (TLS termination).
    trustXForwardedHeaders: false
    # Optional comma-separated CIDRs of trusted proxy sources for forwarded headers.
    # Leave empty to keep default behavior.
    trustedProxyCidrs:

db:
  name: flightctl
  # To use external PostgreSQL database replace `builtin` with `external` and set an appropriate `external:` block
  type: "builtin"

service:
  # Rate limiting configuration
  # Note: Only flightctl-api and flightctl-alertmanager-proxy services use rate limiting
  # Other services ignore this configuration
  rateLimit:
    enabled: true
    requests: 300
    window: 1m
    authRequests: 20
    authWindow: 1h
    trustedProxies: []

grafana:
  oauth:
    enabled:
    authUrl:
    tokenUrl:
    apiUrl:
    scopes:
    clientId:
  localAdminUser:
  localAdminPassword:
  insecureSkipTlsVerify:
  protocol: https
  allowedUnsignedPlugins:

prometheus:

# ImageBuilder Worker (optional). Uncomment and set when using custom builder images, SBOM, or skip-TLS.
# imagebuilderWorker:
#   logLevel: info
#   maxConcurrentBuilds: 2
#   defaultTTL: 168h
#   rpmRepoUrl: ""
#   rpmRepoAdd: true
#   rpmRepoEnable: ""
#   serviceImages:
#     podman:
#       image: ""           # Override Podman builder image (optional)
#       skipTlsVerify: false  # Set to true to skip TLS verification
#     bootcImageBuilder:
#       image: ""           # Override bootc-image-builder image (optional)
#       skipTlsVerify: false  # Set to true to skip TLS verification
#     syft:
#       image: ""           # Override Syft image for SBOM generation (optional)
#       skipTlsVerify: false
#   sbom:
#     enabled: true
#     pushToRegistry: true
#     uploadToTrustify: true
#     purlTransform:
#       enabled: true

# Vulnerability integration (optional). Uncomment and configure to enable.
# When enabled, flightctl-imagebuilder-worker also receives trustify settings (SBOM upload uses the same client as periodic).
# vulnerabilityReporting:
#   # Enable vulnerability integration (sync task in flightctl-periodic + API endpoints in flightctl-api).
#   enabled: false
#   # Sync interval for periodic Trustify fetch (e.g. "15m", "1h").
#   syncInterval: 15m
#   alerting:
#     # Enable per-device CVE alerting for findings above the CVSS threshold.
#     enabled: true
#     # Minimum CVSS base score required to emit a per-device alert.
#     warningCvssThreshold: 4.0
#     criticalCvssThreshold: 7.0
#   trustify:
#     # Trustify API base URL (used by flightctl-periodic only).
#     # NOTE: Do not include the API path; the client appends /api/v2/vulnerability/analyze automatically.
#     endpoint: https://trustify.example.com
#     auth:
#       # Authentication mode. Allowed values: 'client-credentials', 'none'.
#       mode: none
#       # OIDC issuer URL (required when mode is 'client-credentials').
#       oidcIssuerUrl: https://keycloak.example.com/realms/trustify
#       # client_id and client_secret are supplied via FLIGHTCTL_VULNERABILITY_REPORTING_TRUSTIFY_CLIENT_ID
#       # and FLIGHTCTL_VULNERABILITY_REPORTING_TRUSTIFY_CLIENT_SECRET environment variables.

telemetryGateway:
  forward:
    endpoint:

userinfoProxy:
  upstreamUrl:
  insecureSkipTlsVerify:
