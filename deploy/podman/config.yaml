database:
    hostname: flightctl-db
    type: pgsql
    port: 5432
    name: flightctl
    user: admin
service:
    address: flightctl-api:3443
    agentEndpointAddress: flightctl-api:7443
    baseUrl: https://$BASE_DOMAIN:3443/
    baseAgentEndpointUrl: https://$BASE_DOMAIN:7443/
    baseUIUrl: https://$BASE_DOMAIN:8080
    altNames:
      - $BASE_DOMAIN
      - flightctl-api
    # srvCertFile: /root/.flightctl/server.crt
    # srvKeyFile: /root/.flightctl/server.key
kv:
    hostname: flightctl-kv
    port: 6379
