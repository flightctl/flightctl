global:
  nodePorts:
    registry: ""
    privateRegistry: ""
    gitserver: ""
    prometheus: ""
    jaegerUi: ""
  imagePullPolicy: IfNotPresent
  imagePullSecretName: ""
  internalNamespace: ""
registry:
  image: quay.io/flightctl/e2eregistry:2
  nginx:
    image: quay.io/flightctl-tests/nginx:1.28-alpine-slim
  route: true
  hostName: ""
gitserver:
  image: quay.io/flightctl-tests/git-server:latest
prometheus:
  image: quay.io/prometheus/prometheus:v2.54.1
jaeger:
  enabled: false
  image:
    image: jaegertracing/all-in-one
    tag: "1.35"
    pullPolicy: ""
  storageType: memory
  maxTraces: 50000
  otlpEnabled: true
  logLevel: info
  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "512Mi"
      cpu: "200m"
