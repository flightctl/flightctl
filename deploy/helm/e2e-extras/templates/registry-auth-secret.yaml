{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace "e2e-registry-auth" }}
{{- $password := "" }}
{{- if $existingSecret }}
  {{- $password = index $existingSecret.data "password" | b64dec }}
{{- else }}
  {{- $password = randAlphaNum 32 }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: e2e-registry-auth
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  username: "testuser"
  password: "{{ $password }}"
  htpasswd: "{{ htpasswd "testuser" $password }}"
