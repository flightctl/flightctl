apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    flightctl.service: e2e-container-registry
  name: e2e-container-registry
  namespace: {{ .Values.registry.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      flightctl.service: e2e-container-registry
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        flightctl.service: e2e-container-registry
      annotation:
        # make sure that cert changes will trigger reload of the pods
        cert-checksum: {{ .Files.Get "secrets/registry.crt" | sha256sum }}
    spec:
      containers:
        - name: container-reg
          image: {{ .Values.registry.image }}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
              protocol: TCP
          volumeMounts:
            - name: certs
              mountPath: /certs
              readOnly: true
          env:
            - name: REGISTRY_HTTP_TLS_CERTIFICATE
              value: /certs/registry.crt
            - name: REGISTRY_HTTP_TLS_KEY
              value: /certs/registry.key
      volumes:
        - name: certs
          secret:
            secretName: e2e-registry-keys
      restartPolicy: Always
