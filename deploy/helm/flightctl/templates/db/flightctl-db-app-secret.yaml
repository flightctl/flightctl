{{- if and (eq .Values.db.type "builtin") (empty .Values.db.builtin.applicationUserSecretName) }}
{{- /*
Render only when the Secret already exists in-cluster.
Supports Helm CLI upgrades from older charts that owned these Secrets;
see flightctl-db-admin-secret.yaml.
*/}}
{{- $namespaces := list .Release.Namespace }}
{{- $context := . }}
{{- if and .Values.global.internalNamespace (ne .Values.global.internalNamespace .Release.Namespace) }}
{{- $namespaces = append $namespaces .Values.global.internalNamespace }}
{{- end }}
{{- $existingSecret := "" }}
{{- range $n := $namespaces }}
  {{- if not $existingSecret }}
    {{- $tmp := (lookup "v1" "Secret" $n "flightctl-db-app-secret") }}
    {{- if $tmp }}{{- $existingSecret = $tmp }}{{- end }}
  {{- end }}
{{- end }}
{{- if $existingSecret }}
  {{- if not (and (hasKey $existingSecret "data") (hasKey $existingSecret.data "userPassword")) }}
    {{- fail "flightctl-db-app-secret is missing data.userPassword – delete it or add the key." }}
  {{- end }}
  {{- $userPassword := (index $existingSecret.data "userPassword") }}
{{- range $ns := $namespaces }}
---
apiVersion: v1
kind: Secret
metadata:
  name: flightctl-db-app-secret
  namespace: {{ $ns }}
  labels:
    {{- include "flightctl.standardLabels" $context | nindent 4 }}
    flightctl.service: flightctl-db-app
    security.level: application
  annotations:
    helm.sh/resource-policy: keep
    argocd.argoproj.io/sync-options: Prune=false
type: Opaque
data:
  user: {{ "flightctl_app" | b64enc }}
  userPassword: {{ $userPassword }}
{{- end }}
{{- end }}
{{- end }}
