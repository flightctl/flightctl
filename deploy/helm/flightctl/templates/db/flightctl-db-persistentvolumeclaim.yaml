{{- if eq .Values.db.type "builtin" }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  annotations:
    kubernetes.io/reclaimPolicy: Delete
  labels:
    {{- with .Values.global.additionalPVCLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- with .Values.db.builtin.additionalPVCLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- include "flightctl.standardLabels" . | nindent 4 }}
    flightctl.service: flightctl-db
  name: flightctl-db
  namespace:  {{ default .Release.Namespace .Values.global.internalNamespace }}
spec:
  {{- $dbHasStaticBinding := false }}
  {{- if .Values.db.builtin.volumeName }}
  {{- $dbHasStaticBinding = true }}
  {{- end }}
  {{- with .Values.db.builtin.selector }}
  {{- with .matchLabels }}
  {{- $dbHasStaticBinding = true }}
  {{- end }}
  {{- end }}
  {{- if .Values.global.storageClassName }}
  storageClassName: {{ .Values.global.storageClassName }}
  {{- else if $dbHasStaticBinding }}
  {{- /* Explicit "" prevents the DefaultStorageClass admission controller from injecting a mismatched
  default class onto a PVC that's meant to bind to a specific pre-provisioned PV. See:
  https://kubernetes.io/docs/concepts/storage/persistent-volumes/#reserving-a-persistentvolume */}}
  storageClassName: ""
  {{- end }}
  {{- with .Values.db.builtin.volumeName }}
  volumeName: {{ . }}
  {{- end }}
  {{- with .Values.db.builtin.selector }}
  {{- with .matchLabels }}
  selector:
    matchLabels:
      {{- toYaml . | nindent 6 }}
  {{- end }}
  {{- end }}
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.db.builtin.storage.size }}
{{- end }}

