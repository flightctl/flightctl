{{- if and (eq .Values.db.type "builtin") (empty .Values.db.builtin.masterUserSecretName) }}
{{- /*
Render only when the Secret already exists in-cluster.
This supports Helm CLI upgrades from older chart versions that owned these
Secrets as release resources: keeping them in the manifest (with keep)
avoids delete-on-upgrade. When lookup is empty (fresh install / offline
render), omit the Secret and let the password-secrets Job create it.
*/}}
{{- $namespaces := list .Release.Namespace }}
{{- if and .Values.global.internalNamespace (ne .Values.global.internalNamespace .Release.Namespace) }}
{{- $namespaces = append $namespaces .Values.global.internalNamespace }}
{{- end }}
{{- $existingSecret := "" }}
{{- range $n := $namespaces }}
  {{- if not $existingSecret }}
    {{- $tmp := (lookup "v1" "Secret" $n "flightctl-db-admin-secret") }}
    {{- if $tmp }}{{- $existingSecret = $tmp }}{{- end }}
  {{- end }}
{{- end }}
{{- if $existingSecret }}
{{- if not (and (hasKey $existingSecret "data") (hasKey $existingSecret.data "masterPassword")) }}
  {{- fail "flightctl-db-admin-secret is missing data.masterPassword – delete it or add the key." }}
{{- end }}
{{- $masterPassword := (index $existingSecret.data "masterPassword") }}
{{- range $ns := $namespaces }}
---
apiVersion: v1
kind: Secret
metadata:
  name: flightctl-db-admin-secret
  namespace: {{ $ns }}
  labels:
    {{- include "flightctl.standardLabels" $ | nindent 4 }}
    flightctl.service: flightctl-db-admin
    security.level: high-privilege
  annotations:
    meta.helm.sh/release-name: {{ $.Release.Name }}
    meta.helm.sh/release-namespace: {{ $.Release.Namespace }}
    helm.sh/resource-policy: keep
    argocd.argoproj.io/sync-options: Prune=false
type: Opaque
data:
  masterUser: {{ "admin" | b64enc }}
  masterPassword: {{ $masterPassword }}
{{- end }}
{{- end }}
{{- end }}
