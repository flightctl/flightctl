{{- $ensureDbAdmin := and (eq .Values.db.type "builtin") (empty .Values.db.builtin.masterUserSecretName) }}
{{- $ensureDbApp := and (eq .Values.db.type "builtin") (empty .Values.db.builtin.applicationUserSecretName) }}
{{- $ensureDbMigration := and (eq .Values.db.type "builtin") (empty .Values.db.builtin.migrationUserSecretName) }}
{{- $ensureKv := empty .Values.kv.passwordSecretName }}
{{- if or $ensureDbAdmin $ensureDbApp $ensureDbMigration $ensureKv }}
{{- $resourceNames := list }}
{{- if $ensureDbAdmin }}{{- $resourceNames = append $resourceNames "flightctl-db-admin-secret" }}{{- end }}
{{- if $ensureDbApp }}{{- $resourceNames = append $resourceNames "flightctl-db-app-secret" }}{{- end }}
{{- if $ensureDbMigration }}{{- $resourceNames = append $resourceNames "flightctl-db-migration-secret" }}{{- end }}
{{- if $ensureKv }}{{- $resourceNames = append $resourceNames "flightctl-kv-secret" }}{{- end }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: flightctl-password-secrets
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-30"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
  labels:
    {{- include "flightctl.standardLabels" . | nindent 4 }}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: flightctl-password-secrets
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-30"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
  labels:
    {{- include "flightctl.standardLabels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "get"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      {{- range $resourceNames }}
      - {{ . }}
      {{- end }}
    verbs: ["patch", "update"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: flightctl-password-secrets
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-30"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
  labels:
    {{- include "flightctl.standardLabels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: flightctl-password-secrets
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: flightctl-password-secrets

{{- if and .Values.global.internalNamespace (ne .Values.global.internalNamespace .Release.Namespace) }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: flightctl-password-secrets
  namespace: {{ .Values.global.internalNamespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-30"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
  labels:
    {{- include "flightctl.standardLabels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "get"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      {{- range $resourceNames }}
      - {{ . }}
      {{- end }}
    verbs: ["patch", "update"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: flightctl-password-secrets
  namespace: {{ .Values.global.internalNamespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-30"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
  labels:
    {{- include "flightctl.standardLabels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: flightctl-password-secrets
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: flightctl-password-secrets
{{- end }}

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: flightctl-password-secrets-script
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "flightctl.standardLabels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-30"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
data:
  ensure-password-secrets.sh: |
{{ .Files.Get "scripts/ensure-password-secrets.sh" | nindent 4 }}

---
apiVersion: batch/v1
kind: Job
metadata:
  name: flightctl-password-secrets-{{ .Release.Revision }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "flightctl.standardLabels" . | nindent 4 }}
    flightctl.service: flightctl-password-secrets
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-28"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "flightctl.standardLabels" . | nindent 8 }}
        flightctl.service: flightctl-password-secrets
    spec:
      serviceAccountName: flightctl-password-secrets
      restartPolicy: Never
      containers:
      - name: password-secrets
        image: "{{ .Values.clusterCli.image.image }}:{{ .Values.clusterCli.image.tag }}"
        imagePullPolicy: {{ default .Values.global.imagePullPolicy .Values.clusterCli.image.pullPolicy }}
        command:
        - /bin/bash
        - /scripts/ensure-password-secrets.sh
        - --namespace
        - {{ .Release.Namespace }}
        {{- if and .Values.global.internalNamespace (ne .Values.global.internalNamespace .Release.Namespace) }}
        - --internal-namespace
        - {{ .Values.global.internalNamespace }}
        {{- end }}
        {{- if $ensureDbAdmin }}
        - --ensure-db-admin
        {{- end }}
        {{- if $ensureDbApp }}
        - --ensure-db-app
        {{- end }}
        {{- if $ensureDbMigration }}
        - --ensure-db-migration
        {{- end }}
        {{- if $ensureKv }}
        - --ensure-kv
        {{- end }}
        volumeMounts:
        - name: scripts
          mountPath: /scripts
          readOnly: true
      volumes:
      - name: scripts
        configMap:
          name: flightctl-password-secrets-script
          defaultMode: 0755
      {{- if .Values.global.imagePullSecretName }}
      imagePullSecrets:
      - name: {{ .Values.global.imagePullSecretName }}
      {{- end }}
{{- end }}
