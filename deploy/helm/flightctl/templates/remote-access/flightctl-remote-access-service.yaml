{{- if .Values.remoteAccess.enabled -}}
apiVersion: v1
kind: Service
metadata:
  labels:
    flightctl.service: flightctl-remote-access
    {{- include "flightctl.standardLabels" . | nindent 4 }}
  name: flightctl-remote-access
  namespace: {{ .Release.Namespace }}
spec:
  {{- if and (eq (include "flightctl.getServiceExposeMethod" .) "nodePort") .Values.dev.nodePorts.remoteAccess }}
  type: NodePort
  {{- end }}
  ports:
    - name: "service-api"
      port: 3444
      targetPort: 3444
      {{- if and (eq (include "flightctl.getServiceExposeMethod" .) "nodePort") .Values.dev.nodePorts.remoteAccess }}
      nodePort: {{ .Values.dev.nodePorts.remoteAccess }}
      {{- end }}
  selector:
    flightctl.service: flightctl-remote-access
{{- end }}
