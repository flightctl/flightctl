{{- if .Values.remoteAccess.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    flightctl.service: flightctl-remote-access
    {{- include "flightctl.standardLabels" . | nindent 4 }}
  name: flightctl-remote-access
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      flightctl.service: flightctl-remote-access
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        flightctl.service: flightctl-remote-access
        {{- include "flightctl.standardLabels" . | nindent 8 }}
    spec:
      automountServiceAccountToken: false
      {{- if .Values.global.imagePullSecretName }}
      imagePullSecrets:
        - name: {{ .Values.global.imagePullSecretName }}
      {{- end }}
      containers:
        - name: flightctl-remote-access
          image: {{ include "flightctl.ensureOsQualifiedImage" (dict "root" . "imageName" .Values.remoteAccess.image.image) }}:{{ default .Chart.AppVersion .Values.remoteAccess.image.tag }}
          imagePullPolicy: {{ default .Values.global.imagePullPolicy .Values.remoteAccess.image.pullPolicy }}
          ports:
            - containerPort: 3444
              name: service-api
              protocol: TCP
            - containerPort: 7444
              name: agent-api
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: service-api
              scheme: HTTPS
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: service-api
              scheme: HTTPS
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.remoteAccess.resources | nindent 12 }}
          env:
            - name: HOME
              value: "/root"
            - name: KV_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ default "flightctl-kv-secret" .Values.kv.passwordSecretName }}
                  key: password
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "flightctl.dbAppUserSecret" . }}
                  key: userPassword
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "flightctl.dbAppUserSecret" . }}
                  key: user
            {{- if .Values.remoteAccess.env }}
            {{- range $key, $value := .Values.remoteAccess.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- end }}
          volumeMounts:
            - mountPath: /root/.flightctl/config.yaml
              name: flightctl-remote-access-config
              subPath: config.yaml
              readOnly: true
            - mountPath: /root/.flightctl/certs/server.crt
              name: flightctl-remote-access-server-tls
              subPath: tls.crt
              readOnly: true
            - mountPath: /root/.flightctl/certs/server.key
              name: flightctl-remote-access-server-tls
              subPath: tls.key
              readOnly: true
            - mountPath: /root/.flightctl/certs/ca-bundle.crt
              name: flightctl-ca-bundle
              subPath: ca-bundle.crt
              readOnly: true
            - mountPath: /root/.flightctl/encryption
              name: flightctl-encryption-key
              readOnly: true
            {{- include "flightctl.dbSslVolumeMounts" . | nindent 12 }}
      restartPolicy: Always
      volumes:
        - name: flightctl-remote-access-config
          configMap:
            name: flightctl-remote-access-config
        - name: flightctl-remote-access-server-tls
          secret:
            secretName: flightctl-remote-access-server-tls
        - name: flightctl-ca-bundle
          secret:
            secretName: flightctl-ca-bundle
        - name: flightctl-encryption-key
          secret:
            secretName: flightctl-encryption-key
            defaultMode: 0400
        {{- include "flightctl.dbSslVolumes" . | nindent 8 }}
{{- end }}
