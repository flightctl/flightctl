# Minimal observability images fixture for el9.
# All entries must include both 'image' and 'tag' — that is the contract for these files.
# The 'api' and 'worker' keys overlap with helm-chart-opts intentionally; the script
# deduplicates by (image:tag) pair so no duplicate skopeo commands should appear.
api:
  image: quay.io/flightctl/flightctl-api-el9
  tag: latest
worker:
  image: quay.io/flightctl/flightctl-worker-el9
  tag: latest
grafana:
  image: docker.io/grafana/grafana
  tag: "11.0.0"
prometheus:
  image: docker.io/prom/prometheus
  tag: "v2.13.1"
