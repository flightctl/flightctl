apiVersion: flightctl.io/v1alpha1
kind: Fleet
metadata:
  name: default
spec:
  selector:
    matchLabels:
      fleet: default
  template:
    metadata:
      labels:
        fleet: default
    spec:
      config:
        - name: base
          gitRef:
            repository: flightctl-demos
            targetRevision: main
            path: /demos/basic-nginx-demo/configuration/etc/microshift/manifests
            mountPath: /etc/microshift/manifests
      certs:
        - name: otel
          provisioner:
            csr:
              signer: flightctl.io/device-svc-client
          storage:
            FileSystem:
              certPath: /etc/otel/cert.pem
              keyPath: /etc/otel/key.pem
      resources:
        - monitorType: CPU
          alertRules:
            - severity: Warning
              duration: 10m
              percentage: 50
              description: 'CPU load is above 50% for more than 10 minutes'
          samplingInterval: 30s
      systemd:
        matchPatterns:
          - chronyd.service
