name: "Code Quality"

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'release-*'
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      src_changed: ${{ steps.filter.outputs.exists }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Check file changes
        id: filter
        uses: yumemi-inc/path-filter@v2
        with:
          patterns: |
            '!.spelling'
            '!README.md'
            '!docs/**'
            '!.spectral.yaml'
            '!api/**/openapi.yaml'
            '!.github/**'

  lint:
    needs: check-changes
    if: ${{ needs.check-changes.outputs.src_changed == 'true' }}
    runs-on: "ubuntu-24.04"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Fetch Additional Commits
        run: |
          commits=${{ github.event.pull_request.commits }}
          if [[ -n "$commits" ]]; then
            # Prepare enough depth for diffs with master
            git fetch --depth="$(( commits + 1 ))"
          fi

      - name: Check commit message
        run: hack/check-commits.sh

      - name: Setup all dependencies
        uses: ./.github/actions/setup-dependencies

      - name: Check that generated files have been updated and that go.mod is tidy
        run: |
          make generate
          make tidy
          git diff --exit-code

      - name: Running Linter
        run: make lint
