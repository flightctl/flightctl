name: "Unit tests"
on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'release-*'
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      src_changed: ${{ steps.filter.outputs.exists }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Check file changes
        uses: yumemi-inc/path-filter@v2
        id: filter
        with:
          patterns: |
            '!.spelling'
            '!README.md'
            '!docs/**'
            '!.spectral.yaml'
            '!api/**/openapi.yaml'
            '!.github/**'

  unit-tests:
    needs: check-changes
    if: ${{ needs.check-files.outputs.src_changed == 'true' }}
    runs-on: "ubuntu-24.04"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup all dependencies
        uses: ./.github/actions/setup-dependencies

      - name: Running Unit tests
        run: make unit-test
