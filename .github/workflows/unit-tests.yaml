name: "Unit tests"
on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'release-*'
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  unit-tests:
    runs-on: "ubuntu-24.04"

    container:
      image: registry.access.redhat.com/ubi9/go-toolset:1.23.6-1747333074

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            notdocs:
              - '!.spelling'
              - '!README.md'
              - '!docs/**'

      - name: Running Unit tests
        if: ${{ steps.filter.outputs.notdocs == 'true' }}
        run: make unit-test
