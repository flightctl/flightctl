name: "PR release labels"

on:
  pull_request:
    branches:
      - main
    types: [opened, reopened, synchronize, labeled, unlabeled, edited]
  merge_group:

permissions:
  contents: read
  pull-requests: read

jobs:
  release-labels:
    name: Release labels
    runs-on: ubuntu-24.04
    steps:
      - name: Require release target labels
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const releaseRe = /^release-\d+\.\d+$/;
            const labels = context.payload.pull_request.labels.map((l) => l.name);
            const releaseLabels = labels.filter((n) => releaseRe.test(n));
            if (releaseLabels.length === 0) {
              core.setFailed(
                'Every PR must target at least one release. Add a "release-X.Y" label (e.g., release-1.3).',
              );
              return;
            }
            console.log(`Release targets: ${releaseLabels.join(', ')}`);

      - name: Merge queue (label check skipped here)
        if: github.event_name == 'merge_group'
        run: |
          echo "Merge queue: release labels were validated on the pull request before entering the queue."
