name: "Release CLI Binaries on GH"
on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - '*'
  pull_request:

jobs:
  setup:
    name: Set Up Shared Environment
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y make

  build:
    name: Build Binaries
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.21

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Install dependencies
      - name: Install Dependencies
        run: go mod tidy

      - name: Build
        run: |
          make multiarch-build-cli

  save:
    name: Save artefacts (linux)
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        include:
          - os_arch: "linux-amd64"
            arch: "amd64"
            os: "linux"
            zip: ".tar.gz"
            ext: ""
          - os_arch: "linux-arm64"
            arch: "arm64"
            os: "linux"
            zip: ".tar.gz"
            ext: ""
          - os_arch: "darwin-amd64"
            arch: "amd64"
            os: "mac"
            zip: ".zip"
            ext: ""
          - os_arch: "darwin-arm64"
            arch: "arm64"
            os: "mac"
            zip: ".zip"
            ext: ""
          - os_arch: "windows-amd64"
            arch: "amd64"
            os: "windows"
            zip: ".zip"
            ext: ".exe"
          - os_arch: "windows-arm64"
            arch: "arm64"
            os: "windows"
            zip: ".zip"
            ext: ".exe"

    steps:
      - name: Save tar binary
        uses: actions/upload-artifact@v4
        with:
          name: "flightctl-${{ matrix.os_arch }}${{ matrix.zip }}"
          path: "bin/clis/archives/${{ matrix.arch }}/${{ matrix.os }}/flightctl${{ matrix.zip }}"

      - name: Save binary
        uses: actions/upload-artifact@v4
        with:
          name: "flightctl-${{ matrix.os_arch }}${{ matrix.ext }}"
          path: "bin/clis/binaries/${{ matrix.arch }}/${{ matrix.os }}/flightctl${{ matrix.ext }}"

      - name: Save checksum
        uses: actions/upload-artifact@v4
        with:
          name: "flightctl-${{ matrix.os_arch }}-sha256.txt"
          path: "bin/clis/gh-archives/${{ matrix.arch }}/${{ matrix.os }}/flightctl-${GOOS}-${GOARCH}${ext}.sha256"

  verify-windows:
    name: Verify Binaries on windows
    runs-on: "windows-latest"
    needs: save
    steps:
      - name: Load binary
        uses: actions/download-artifact@v4
        with:
          name: flightctl-windows-amd64.exe
      - name: Verify
        run: .\flightctl-windows-amd64.exe version

  verify:
    name: Verify Binaries on linux/macos
    strategy:
      matrix:
        include:
          - os_arch: "linux-amd64"
            runner: "ubuntu-latest"
          - os_arch: "linux-arm64"
            runner: "ubuntu-latest"
          - os_arch: "darwin-amd64"
            runner: "macos-latest"
          - os_arch: "darwin-arm64"
            runner: "macos-latest"
    runs-on: ${{ matrix.runner }}
    needs: save

    steps:
      - name: Load binary
        uses: actions/download-artifact@v4
        with:
          name: flightctl-${{ matrix.os_arch }}

      - name: Make Executable
        run: chmod +x flightctl-${{ matrix.os_arch }}

      - name: Setup QEMU
        run: |
          if [[ "${{ matrix.os_arch }}" == "linux-arm64" ]]; then
            docker run --rm --privileged multiarch/qemu-user-static --reset -p yes
          fi

      - name: Verify
        run: |
          # Verify version output
          if [[ "${{ matrix.os_arch }}" == "linux-arm64" ]]; then
            docker run --rm --platform linux/arm64 -v ${{ github.workspace }}:/workspace ubuntu:latest /workspace/flightctl-${{ matrix.os_arch }} version
          else
            ./flightctl-${{ matrix.os_arch }} version
          fi
          if [ $? -gt 0 ]; then
            echo "Error: Version command failed"
            exit 1
          fi

  publish:
    name: Publish Binaries
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load binary archives
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: release

      # if this is a push to the main branch, we update the latest release of binaries
      - name: Publish latest
        if: ${{ github.ref_type == 'branch' && github.ref_name == 'main' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OLD_RELEASE=$(gh release list --json 'tagName' --jq 'any(.[]; .tagName == "latest")')
          if [ $OLD_RELEASE == 'true' ]; then
            # if there is a release already we only update the binaries
            # otherwise a new release will trigger an rpm build from packit
            gh release upload latest --clobber release/*
          else
            # if the release did not exist, we should create it at least once
            gh release create -p -n "Flightctl CLI pre-release" latest release/*
          fi

      # if this is a tag, we upload the release binaries, the release already exists
      - name: Publish tag
        if: ${{ github.ref_type == 'tag' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.ref_name }} release/*
