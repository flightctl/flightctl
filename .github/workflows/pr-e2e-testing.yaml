name: "E2E testing (Parallel Build)"

on:
  workflow_dispatch:
    inputs:
      label_filter:
        description: 'Ginkgo label filter expression to filter e2e tests'
        required: false
        default: 'sanity'
        type: string
  push:
    branches:
      - main
      - 'release-*'
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  merge_group:

permissions:
  contents: read
  pull-requests: read

concurrency:
  # labeled events get their own group so adding the run-e2e label never
  # cancels an in-progress push run (and vice-versa).
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}-${{ github.event.action == 'labeled' && 'labeled' || 'push' }}
  cancel-in-progress: true


env:
  DOCKER_BUILDKIT: 1
  BUILDKIT_PROGRESS: plain
  QUAY_ORG: quay.io/flightctl
  QUAY_TESTS_ORG: quay.io/flightctl-tests
  REGISTRY: quay.io
  REGISTRY_OWNER: flightctl
  REGISTRY_OWNER_TESTS: flightctl-tests
  GITHUB_ACTIONS: true

jobs:
  compute-tag:
    runs-on: ubuntu-24.04
    outputs:
      tag: ${{ steps.compute-tag.outputs.git_tag }}
      any_changed: ${{ steps.changed-files.outputs.any_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v46
        with:
          since_last_remote_commit: 'true'
          files_ignore: |
            .spelling
            README.md
            docs/**
            examples/**

      - name: Compute tag
        id: compute-tag
        if: ${{ steps.changed-files.outputs.any_changed == 'true' }}
        uses: ./.github/actions/compute-tag

  build-images-and-charts:
    needs: compute-tag
    if: |
      needs.compute-tag.outputs.any_changed == 'true' &&
      (github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'run-e2e'))
    uses: ./.github/workflows/build-images-and-charts.yaml

  build-flightctl-cli:
    needs: [build-images-and-charts, compute-tag]
    if: |
      needs.compute-tag.outputs.any_changed == 'true' &&
      (github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'run-e2e'))
    runs-on: ubuntu-24.04
    outputs:
      tag: ${{ needs.compute-tag.outputs.tag }}
    steps:
      - name: CLI built with backend job
        run: echo "CLI artifact produced by build-images-and-charts"

  build-rpms:
    needs: compute-tag
    if: |
      needs.compute-tag.outputs.any_changed == 'true' &&
      (github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'run-e2e'))
    strategy:
      matrix:
        include:
          - root: centos-stream+epel-next-9-x86_64
          - root: epel-10-x86_64
    uses: ./.github/workflows/build-rpms.yaml
    with:
      root: ${{ matrix.root }}

  build-agent-images-unified:
    needs: [compute-tag, build-rpms]
    if: |
      needs.compute-tag.outputs.any_changed == 'true' &&
      (github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'run-e2e'))
    strategy:
      matrix:
        include:
          - os_id: cs9-bootc
            rpm_suffix: centos-stream+epel-next-9-x86_64
          - os_id: cs10-bootc
            rpm_suffix: epel-10-x86_64
    uses: ./.github/workflows/build-agent-images.yaml
    with:
      rpm_suffix: ${{ matrix.rpm_suffix }}
      os_id: ${{ matrix.os_id }}
      tag: ${{ needs.compute-tag.outputs.tag }}

  discover-e2e-tests:
    needs: compute-tag
    if: |
      needs.compute-tag.outputs.any_changed == 'true' &&
      (github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'run-e2e'))
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - label_filter: 'sanity'
            ginkgo_total_nodes: 10
          - label_filter: 'sanity && agent && !microshift'
            ginkgo_total_nodes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup dependencies
        uses: ./.github/actions/setup-dependencies

      - name: Compute label filter hash
        id: compute-hash
        run: |
          HASH=$(printf '%s' "${{ matrix.label_filter }}" | sha256sum | cut -c1-8)
          echo "hash=${HASH}" >> "$GITHUB_OUTPUT"
          echo "Label filter: ${{ matrix.label_filter }}"
          echo "Hash: ${HASH}"

      - name: Run test discovery
        env:
          GINKGO_LABEL_FILTER: ${{ matrix.label_filter }}
          DISCOVERY_ONLY: "true"
          DISCOVERY_PATH: discovery.json
        run: |
          mkdir -p reports
          test/scripts/run_e2e_tests.sh reports ./test/e2e/...

      - name: Validate discovery results
        run: |
          echo "=== Discovery file info ==="
          ls -la discovery.json

          echo ""
          echo "=== Discovery content (formatted) ==="
          jq '.' discovery.json

          echo ""
          echo "=== Tests found ==="
          TEST_COUNT=$(jq -r '[.[] | .SpecReports[]? | select(.LeafNodeLabels != null)] | length' discovery.json)
          echo "Total tests found with filter '${{ matrix.label_filter }}': ${TEST_COUNT}"

          if [[ "${TEST_COUNT}" -eq 0 ]]; then
            echo "ERROR: No tests found in discovery! Check for compilation errors above."
            exit 1
          fi

      - name: Restore test timings cache
        uses: actions/cache/restore@v4
        with:
          path: test/scripts/test-timings.json
          key: e2e-test-timings-${{ github.run_id }}
          restore-keys: e2e-test-timings-

      - name: Compute test assignments
        working-directory: test/scripts
        run: |
          go run ./compute_test_assignments \
            --discovery ../../discovery.json \
            --timings test-timings.json \
            --nodes ${{ matrix.ginkgo_total_nodes }} \
            --output ../../assignments.json

      - name: Upload discovery artifact
        uses: actions/upload-artifact@v4
        with:
          name: e2e-discovery-${{ steps.compute-hash.outputs.hash }}-${{ needs.compute-tag.outputs.tag }}
          path: |
            discovery.json
            assignments.json
          retention-days: 1

  e2e-tests:
    needs:
      - compute-tag
      - build-images-and-charts
      - build-flightctl-cli
      - build-agent-images-unified
      - discover-e2e-tests
    if: |
      needs.compute-tag.outputs.any_changed == 'true' &&
      (github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'run-e2e'))
    strategy:
      fail-fast: false
      matrix:
        include:
          ## CS9: all sanity tests (LPT balances agent + non-agent + slow together)
          - os_id: cs9-bootc
            backend_type: helm
            label_filter: 'sanity'
            ginkgo_total_nodes: 10
          ## CS10: agent tests only; microshift tests are excluded until the cs10-bootc kernel
          ## includes xt_conntrack/xt_comment modules required by kube-proxy. CS9 provides
          ## full microshift coverage via the v12 OKD SCOS variant.
          - os_id: cs10-bootc
            backend_type: helm
            label_filter: 'sanity && agent && !microshift'
            ginkgo_total_nodes: 5
    uses: ./.github/workflows/run-e2e-tests.yaml
    with:
      os_id: ${{ matrix.os_id }}
      backend_type: ${{ matrix.backend_type }}
      ginkgo_total_nodes: ${{ matrix.ginkgo_total_nodes }}
      ginkgo_label_filter: ${{ matrix.label_filter }}
      tag: ${{ needs.compute-tag.outputs.tag }}

  api-tests:
    needs:
      - compute-tag
      - build-images-and-charts
    if: |
      needs.compute-tag.outputs.any_changed == 'true' &&
      (github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'run-e2e'))
    uses: ./.github/workflows/run-api-tests.yaml
    with:
      tag: ${{ needs.compute-tag.outputs.tag }}

  e2e:
    runs-on: ubuntu-latest
    needs: [ compute-tag, e2e-tests, api-tests ]
    if: always()
    steps:
      - name: Check E2E Test Results
        env:
          HAS_RUN_E2E_LABEL: ${{ contains(github.event.pull_request.labels.*.name, 'run-e2e') }}
        run: |
          if [[ "${{ needs.compute-tag.outputs.any_changed }}" != "true" ]]; then
            echo "E2E tests were skipped (docs-only or ignored paths)"
            exit 0
          fi
          # PRs skip e2e unless the run-e2e label is present; merge queue always runs e2e
          if [[ "${{ github.event_name }}" == "pull_request" && "${HAS_RUN_E2E_LABEL}" != "true" ]]; then
            echo "E2E tests skipped for this PR (add the 'run-e2e' label to run e2e, merge queue always runs)"
            exit 0
          fi
          E2E_RESULT="${{ needs.e2e-tests.result }}"
          API_RESULT="${{ needs.api-tests.result }}"
          # At this point we are past the early-exit guards, so tests were expected to run.
          # "skipped" here means an upstream dependency (e.g. image build) failed and caused
          # e2e-tests to be skipped by GitHub Actions — that must be treated as a failure.
          if [[ "$E2E_RESULT" == "success" ]] && \
             [[ "$API_RESULT" == "success" || "$API_RESULT" == "skipped" ]]; then
            echo "All tests passed (e2e: $E2E_RESULT, api: $API_RESULT)"
            exit 0
          else
            echo "Tests failed, were cancelled, or were skipped due to a dependency failure (e2e: $E2E_RESULT, api: $API_RESULT)"
            exit 1
          fi
