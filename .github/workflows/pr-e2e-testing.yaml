      - name: "Run test 87531 (attempt 20/20)"
        if: always()
        env:
          GINKGO_LABEL_FILTER: "87531"
          AGENT_OS_ID: cs10-bootc
        run: make -e run-e2e-test

      - name: Collect and Upload Logs
        if: always()
        uses: ./.github/actions/collect-logs
        with:
          namespace-external: 'flightctl-external'
          namespace-internal: 'flightctl-internal'
          log-directory: 'helm-flake-logs-${{ matrix.attempt }}'

  e2e:
    runs-on: ubuntu-latest
    needs: [ compute-tag, helm-flake-repro ]
    if: always()
    steps:
      - name: Check E2E Test Results
        env:
          HAS_RUN_E2E_LABEL: ${{ contains(github.event.pull_request.labels.*.name, 'run-e2e') }}
          E2E_RUN_ON_MAIN_PRS: ${{ vars.E2E_RUN_ON_MAIN_PRS }}
        run: |
          if [[ "${{ needs.compute-tag.outputs.any_changed }}" != "true" ]]; then
            echo "E2E tests were skipped (docs-only or ignored paths)"
            exit 0
          fi
          # PRs targeting main skip e2e unless run-e2e label or E2E_RUN_ON_MAIN_PRS is set
          if [[ "${{ github.event_name }}" == "pull_request" && ! "${{ github.base_ref }}" =~ ^release- && "${HAS_RUN_E2E_LABEL}" != "true" && "${E2E_RUN_ON_MAIN_PRS}" != "true" ]]; then
            echo "E2E tests skipped for PRs targeting main (will run in merge queue)"
            echo "To run e2e tests on this PR, add the 'run-e2e' label"
            exit 0
          fi
          if [[ "${{ needs.helm-flake-repro.result }}" == "success" ]]; then
            echo "All E2E tests passed!"
            exit 0
          elif [[ "${{ needs.helm-flake-repro.result }}" == "skipped" ]]; then
            echo "E2E tests were skipped"
            exit 0
          else
            echo "E2E tests failed or were cancelled"
            exit 1
          fi
