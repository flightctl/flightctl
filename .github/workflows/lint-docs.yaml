name: "Documentation Quality"

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'release-*'
  pull_request:

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      docs_changed: ${{ steps.filter.outputs.exists }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Check file changes
        id: filter
        uses: yumemi-inc/path-filter@v2
        with:
          patterns: |
            '.spelling'
            'README.md'
            'docs/**'

  lint-docs:
    needs: check-changes
    if: ${{ needs.check-changes.outputs.docs_changed == 'true' }}
    runs-on: "ubuntu-24.04"
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Running Markdown Linter
        run: make lint-docs

      - name: Running Spellchecker
        run: make spellcheck-docs

      - name: Verifying diagrams have source embedded
        run: make lint-diagrams
