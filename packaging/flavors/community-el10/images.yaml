# Image configuration for community-el10 flavor
# Used by flightctl-standalone render quadlets and helm chart values

api:
  image: quay.io/flightctl/flightctl-api
  tag: latest
periodic:
  image: quay.io/flightctl/flightctl-periodic
  tag: latest
worker:
  image: quay.io/flightctl/flightctl-worker
  tag: latest
alert-exporter:
  image: quay.io/flightctl/flightctl-alert-exporter
  tag: latest
cli-artifacts:
  image: quay.io/flightctl/flightctl-cli-artifacts
  tag: latest
alertmanager-proxy:
  image: quay.io/flightctl/flightctl-alertmanager-proxy
  tag: latest
pam-issuer:
  image: quay.io/flightctl/flightctl-pam-issuer
  tag: latest
ui:
  image: quay.io/flightctl/flightctl-ui
  tag: latest
db-setup:
  image: quay.io/flightctl/flightctl-db-setup
  tag: latest
db:
  # Using CentOS Stream 10 PostgreSQL for EL10 flavor
  image: quay.io/sclorg/postgresql-16-c10s
  tag: "latest"
kv:
  # Using Valkey (Redis replacement) for EL10 flavor
  image: quay.io/sclorg/valkey-7-c10s
  tag: "latest"
alertmanager:
  image: quay.io/prometheus/alertmanager
  tag: v0.28.1
imagebuilder-api:
  image: quay.io/flightctl/flightctl-imagebuilder-api
  tag: latest
imagebuilder-worker:
  image: quay.io/flightctl/flightctl-imagebuilder-worker
  tag: latest
grafana:
  image: docker.io/grafana/grafana
  tag: "11.4.0"
prometheus:
  image: docker.io/prom/prometheus
  tag: v2.13.1
telemetry-gateway:
  image: quay.io/flightctl/flightctl-telemetry-gateway
  tag: latest
userinfo-proxy:
  image: quay.io/flightctl/flightctl-userinfo-proxy
  tag: latest