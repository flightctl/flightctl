# RPM-only images for the community-el9 variant.
#
# These images are pulled by flightctl RPMs (e.g. via quadlet unit files)
# and are NOT listed in deploy/helm/helm-chart-opts.yaml.  They must be
# mirrored separately for an air-gapped community-el9 installation.
#
# Images that ARE in helm-chart-opts.yaml must NOT be duplicated here —
# the mirror tool reads both sources and helm-chart-opts entries take
# precedence for all Helm-managed components.
#
# pam-issuer and userinfo-proxy carry no explicit tag so that the tool's
# effective tag (appVersion or --tag-override) is applied, ensuring they
# match the installed RPM version.

pam-issuer:
  image: quay.io/flightctl/flightctl-pam-issuer-el9

userinfo-proxy:
  image: quay.io/flightctl/flightctl-userinfo-proxy-el9

# kv here is the upstream Docker Hub image used by quadlets;
# the Helm chart uses quay.io/sclorg/redis-7-c9s (a different image).
kv:
  image: docker.io/redis
  tag: "7.4.1"

grafana:
  image: docker.io/grafana/grafana
  tag: latest

prometheus:
  image: docker.io/prom/prometheus
  tag: v2.13.1
