# RPM-only images for the community-el10 variant.
#
# These images are pulled by flightctl RPMs (e.g. via quadlet unit files)
# and are NOT listed in deploy/helm/helm-chart-opts.yaml.  They must be
# mirrored separately for an air-gapped community-el10 installation.
#
# Images that ARE in helm-chart-opts.yaml must NOT be duplicated here —
# the mirror tool reads both sources and helm-chart-opts entries take
# precedence for all Helm-managed components.
#
# pam-issuer and userinfo-proxy carry no explicit tag so that the tool's
# effective tag (appVersion or --tag-override) is applied, ensuring they
# match the installed RPM version.

pam-issuer:
  image: quay.io/flightctl/flightctl-pam-issuer-el10

userinfo-proxy:
  image: quay.io/flightctl/flightctl-userinfo-proxy-el10

grafana:
  # Using public registry — same version without auth requirements
  image: quay.io/ceph/grafana
  tag: "9.4.10"

prometheus:
  # Using official Prometheus registry — same version without auth requirements
  image: quay.io/prometheus/prometheus
  tag: "v2.43.1"
